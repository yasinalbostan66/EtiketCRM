<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/icon-192.png">
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("service-worker.js")
                    .then(reg => console.log("ServiceWorker registered"))
                    .catch(err => console.error("ServiceWorker failed:", err));
            });
        }
    </script>
    <title>Giriş Yap | SATIŞ KİŞİSEL KULLANIM CRM</title>
    <link rel="stylesheet" href="css/style.css?v=3.4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #0b0f17;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .login-card {
            background: rgba(20, 27, 38, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header i {
            font-size: 3rem;
            color: #3b82f6;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3));
        }
        .login-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .login-header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: #cbd5e1;
        }
        .input-icon-group {
            position: relative;
        }
        .input-icon-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }
        .input-icon-group input {
            width: 100%;
            padding: 12px 12px 12px 42px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .input-icon-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.3);
        }
        #loginError {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <i class="fa-solid fa-layer-group"></i>
            <h1>CRM Giriş</h1>
            <p>Admin paneline erişmek için oturum açın</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-posta</label>
                <div class="input-icon-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="ornek@alanadi.com">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Şifre</label>
                <div class="input-icon-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
            </div>
            
            <button type="submit" class="btn-login" id="loginSubmitBtn">Oturum Aç</button>
            <button type="button" class="btn-login" style="background:transparent; border:1px solid rgba(255,255,255,0.15); color:#94a3b8; margin-top:0.75rem; box-shadow:none;" onclick="window.location.href='index.html'">Şifresiz Devam Et (Test Modu)</button>
            <div id="loginError">E-posta veya şifre hatalı!</div>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('loginSubmitBtn');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            submitBtn.textContent = 'Giriş Yapılıyor...';
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
