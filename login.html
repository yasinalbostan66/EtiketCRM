<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/icon-192.png">
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("service-worker.js")
                    .then(reg => console.log("ServiceWorker registered"))
                    .catch(err => console.error("ServiceWorker failed:", err));
            });
        }
    </script>
    <title>Giriş Yap | SATIŞ KİŞİSEL KULLANIM CRM</title>
    <link rel="stylesheet" href="css/style.css?v=2.3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .login-card {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header i {
            font-size: 3rem;
            color: #3b82f6;
            margin-bottom: 1rem;
        }
        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .login-header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: #cbd5e1;
        }
        .input-icon-group {
            position: relative;
        }
        .input-icon-group i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }
        .input-icon-group input {
            width: 100%;
            padding: 10px 12px 10px 38px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .input-icon-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }
        .btn-login:hover {
            background: #2563eb;
        }
        #loginError {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <i class="fa-solid fa-layer-group"></i>
            <h1>CRM Giriş</h1>
            <p>Admin paneline erişmek için oturum açın</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-posta</label>
                <div class="input-icon-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="ornek@alanadi.com" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Şifre</label>
                <div class="input-icon-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>
            
            <button type="submit" class="btn-login" id="loginSubmitBtn">Oturum Aç</button>
            <div id="loginError">E-posta veya şifre hatalı!</div>
        </form>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    
    <script>
        // Use exact config from sync config files
        const firebaseConfig = {
          apiKey: "AIzaSyDeVtAMX-q5Zlz_S-eKzEMOaAFb_5BYq-c",
          authDomain: "etiketcrm.firebaseapp.com",
          projectId: "etiketcrm",
          storageBucket: "etiketcrm.firebasestorage.app",
          messagingSenderId: "579736235492",
          appId: "1:579736235492:web:dcb3b1da19a12847842bf1"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // ** GİREMİYORSANIZ OTOMATİK KULLANICI OLUŞTURUCU **
        // Sayfa her yüklendiğinde bu hesabı oluşturmaya çalışır. Zaten varsa hata verir (Zararsızdır).
        auth.createUserWithEmailAndPassword('admin@etiketcrm.com', 'admin123')
            .then(() => console.log('Varsayılan Admin Hesabı Oluşturuldu.'))
            .catch(e => console.log('Hesap zati mevcut veya hata:', e.message));

        // Already logged in? Redirect to index setup
        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const submitBtn = document.getElementById('loginSubmitBtn');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Giriş yapılıyor...';
            loginError.style.display = 'none';

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Auth state handle redirects automatically
                })
                .catch((error) => {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Oturum Aç';
                    loginError.style.display = 'block';
                    loginError.textContent = 'Giriş başarısız: ' + error.message;
                });
        });
    </script>
</body>
</html>
