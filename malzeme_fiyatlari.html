    <style>
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }
        .action-cell {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }
        @media print {
            @page { size: A4; margin: 10mm; }
            .sidebar, .top-header, .mobile-bottom-nav, .sidebar-overlay,
            .no-print { display: none !important; }
            .main-content { margin-left: 0 !important; width: 100% !important; }
            .content-wrapper { padding: 0 !important; }
            body { background: #fff !important; color: #000 !important; }
            .panel { box-shadow: none !important; border: 1px solid #ccc !important; background: #fff !important; }
            table { width: 100% !important; border-collapse: collapse !important; }
            th, td { border: 1px solid #ccc !important; padding: 6px 8px !important; color: #000 !important; background: #fff !important; font-size: 0.8rem !important; }
            th { background: #f1f5f9 !important; }
            .action-cell, .btn-icon { display: none !important; }
            .badge { background: #eee !important; color: #333 !important; }
        }

        /* Malzeme form 2 kolon düzeni */
        .malzeme-form-layout {
            display: grid;
            grid-template-columns: 1fr;   /* Artık tek sütun - yan panel yok */
            gap: 1rem;
            align-items: start;
        }

        /* Hızlı seçim dropdown - Malzeme adı input altında */
        .quick-dropdown {
            position: absolute;
            top: calc(100% + 2px);
            left: 0; right: 0;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            z-index: 9999;
            display: none;
            padding: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            max-height: 200px;
            overflow-y: auto;
        }
        .quick-dropdown.open { display: block; }
        .quick-dropdown-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            padding: 0 2px;
        }
        .quick-dropdown-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .quick-dropdown-btns button {
            padding: 4px 10px;
            font-size: 0.78rem;
            border: 1px solid var(--border-color);
            background: var(--surface-hover);
            color: var(--text-main);
            border-radius: 14px;
            cursor: pointer;
            transition: .12s;
            white-space: nowrap;
        }
        .quick-dropdown-btns button:hover,
        .quick-dropdown-btns button.selected {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        /* Malzeme input wrapper – gerekli position:relative için */
        .malzeme-adi-wrapper {
            position: relative;
        }
    </style>
</head>
<body>

                <div class="panel no-print">

                    <form id="malzemeForm">

                        <div class="malzeme-form-layout">
                            <!-- Sol: form alanları -->
                            <div>
                                <div class="form-row" style="grid-template-columns: 1fr 1fr;">
                                    <div class="form-group">
                                        <label for="malzemeTuru">Grup *</label>
                                        <select id="malzemeTuru" class="form-control" required>
                                                              <option value="">Seçiniz...</option>
                                            <option value="Kağıt">Kağıt</option>
                                            <option value="Mürekkep">Mürekkep</option>
                                            <option value="Sarf Malzeme">Sarf Malzeme</option>
                                            <option value="Klişe">Klişe</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="malzemeAdi">Malzeme Adı *</label>
                                        <div class="malzeme-adi-wrapper">
                                            <input type="text" id="malzemeAdi" class="form-control" placeholder="örn: Kuşe" required autocomplete="off">
                                            <div class="quick-dropdown" id="quickDropdown">
                                                <div class="quick-dropdown-title"><i class="fa-solid fa-bolt"></i> Hızlı Seçim</div>
                                                <div class="quick-dropdown-btns" id="quickDropdownBtns"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="form-row" style="grid-template-columns: 1fr 1fr 1fr;">
                                    <div class="form-group">
                                        <label for="birimFiyat">Birim Fiyat *</label>
                                        <input type="number" id="birimFiyat" class="form-control" step="0.0001" placeholder="0.00" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="dovizCinsi">Para Birimi</label>
                                        <select id="dovizCinsi" class="form-control" required>
                                            <option value="USD">($)</option>
                                            <option value="EUR">(€)</option>
                                            <option value="TRY">(₺)</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="malzemeBirim">Birim</label>
                                        <select id="malzemeBirim" class="form-control">
                                            <option value="kg">kg</option>
                                            <option value="m²">m²</option>
                                            <option value="adet">adet</option>
                                            <option value="Litre">Litre</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="malzemeStok">Mevcut Stok</label>
                                    <input type="number" id="malzemeStok" class="form-control" step="0.01" min="0" placeholder="0">
                                </div>
                                <div style="margin-top: 1rem; display:flex; gap:0.5rem; justify-content:flex-end;">
                                    <button type="button" id="iptalBtn" class="btn btn-outline" style="display:none;">İptal</button>

                                </div>
                        </div>

    <script>
    const MATBAA_MALZEME = {
        'Kağıt': [
            'Kuşe Kağıt','Parlak Kuşe','Mat Kuşe','Kraft Kağıt','Offset Kağıt','Termal Kağıt',
            'Folyo Kağıt','Opak Filim','Silver Filim','Gold Filim','PP Filim','PET Filim',
            'PVC Etiket','Bobin Kağıt','Yapışkanlı Etiket'
        ],
        'Mürekkep': [
            'UV Mürekkep','Su Baz Baskı M.','Solvent Mürekkep','CMYK Siyah','CMYK Cyan',
            'CMYK Magenta','CMYK Sarı','Beyaz Mürekkep','Vernik','OPV Vernik','Primer'
        ],
        'Sarf Malzeme': [
            'Bıçak','Zombıak','Japon Bıçak','Lastik','Piston Gömleği','Çıpa','Vida','Somun',
            'Pres Altı','Silindir','Baskı Bezi','Zemin Plaketi','Aniloks Merdane','Kamera Filimi',
            'Film','Plaka','Matris','Conta','Yatağı','Bant','Makine Yağı','Baskı Doğrulayıcısı'
        ],
        'Klişe': [
            'Standart Klişe (Asit İndirme)', 'Standart Klişe', 'Fotopolimer Klişe', 'Digital Klişe', 'Flekso Klişesi', 'Tifdruk Silindiri'
        ]
    };

    const malzemeAdiInput = document.getElementById('malzemeAdi');
    const quickDropdown   = document.getElementById('quickDropdown');
    const quickDropdownBtns = document.getElementById('quickDropdownBtns');

    // Grup değişince dropdown butonlarını güncelle (dropout henüz açma)
    document.getElementById('malzemeTuru').addEventListener('change', function() {
        const grp = this.value;
        quickDropdownBtns.innerHTML = '';
        if (!grp || !MATBAA_MALZEME[grp]) {
            quickDropdown.classList.remove('open');
            return;
        }
        MATBAA_MALZEME[grp].forEach(name => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.textContent = name;
            btn.addEventListener('mousedown', (e) => {
                e.preventDefault(); // blur tetiklenmesin
                malzemeAdiInput.value = name;
                quickDropdownBtns.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                quickDropdown.classList.remove('open');
            });
            quickDropdownBtns.appendChild(btn);
        });
    });

    // Malzeme adına tıklanınca / odaklanınca dropdown aç (eğer butonlar varsa)
    malzemeAdiInput.addEventListener('focus', () => {
        if (quickDropdownBtns.children.length > 0) {
            quickDropdown.classList.add('open');
        }
    });

    // Dışarı tıklayınca kapat
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.malzeme-adi-wrapper')) {
            quickDropdown.classList.remove('open');
        }
    });
    </script>

                <!-- Malzeme Listesi -->
