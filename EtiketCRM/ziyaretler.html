<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/icon-192.png">
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("service-worker.js")
                    .then(reg => console.log("ServiceWorker registered"))
                    .catch(err => console.error("ServiceWorker failed:", err));
            });
        }
    </script>
    <title>Ziyaret Kayıtları | SATIŞ KİŞİSEL KULLANIM</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css?v=3.5">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
	<script>if(localStorage.getItem("etiket_crm_theme") === "light") document.body.classList.add("light-mode");</script>

    <div class="app-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="logo">
                    <i class="fa-solid fa-layer-group"></i>
                    SATIŞ KİŞİSEL KULLANIM
                </a>
            </div>
            
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <i class="fa-solid fa-chart-line"></i>
                    Genel Bakış
                </a>
                <a href="firmalar.html" class="nav-item">
                    <i class="fa-solid fa-users"></i>
                    Müşteriler / Firmalar
                </a>
                <a href="ziyaretler.html" class="nav-item active">
                    <i class="fa-solid fa-clipboard-list"></i>
                    Ziyaret Kayıtları
                </a>
                <a href="takvim.html" class="nav-item">
                    <i class="fa-solid fa-calendar-days"></i>
                    Ziyaret Takvimi
                </a>
                <a href="odeme_takibi.html" class="nav-item">
                    <i class="fa-solid fa-money-bill-transfer"></i>
                    Ödeme Takibi & Cari
                </a>
                <a href="malzeme_fiyatlari.html" class="nav-item">
                    <i class="fa-solid fa-tags"></i>
                    Malzeme Fiyatları
                </a>
                

            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="top-header">
                <div class="page-title">Ziyaret Kayıtları Planlayıcı</div>
                <div class="header-actions">
                    <div style="width: 36px; height: 36px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 600;">
                        YA
                    </div>
                </div>
            </header>

            <!-- Content -->
            <div class="content-wrapper">
                
                <!-- Ziyaret Listesi -->
                <div class="panel">
                    <div class="panel-header" style="flex-wrap: wrap; gap: 1rem;">
                        <h2 class="panel-title"><i class="fa-solid fa-list-check"></i> Kayıtlı Ziyaretler</h2>
                        <div class="d-flex gap-2" style="margin-left: auto; flex-wrap: wrap;">
                            <input type="text" id="searchInput" class="form-control" placeholder="Ara..." style="max-width:200px; padding: 5px 10px; font-size:0.9rem;">
                            <button class="btn btn-primary" onclick="openZiyaretModal()" style="font-size: 0.85rem; padding: 6px 12px;">
                                <i class="fa-solid fa-plus"></i> Yeni Ziyaret
                            </button>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Tarih</th>
                                    <th>Saat</th>
                                    <th>Firma</th>
                                    <th>Durum</th>
                                    <th>Not</th>
                                    <th style="text-align: right;">İşlem</th>
                                </tr>
                            </thead>
                            <tbody id="ziyaretTableBody">
                                <!-- JS ile doldurulacak -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Ziyaret Ekle/Düzenle Modal -->
    <div id="ziyaretModal" class="modal-overlay" style="display: none;">
        <div class="modal-content panel" style="max-width:500px;">
            <!-- Sticky başlık -->
            <div class="panel-header">
                <h2 class="panel-title" id="modalTitle" style="font-size:1rem;"><i class="fa-solid fa-plus-circle"></i> Yeni Ziyaret Kaydı Ekle</h2>
                <button class="btn-icon" onclick="closeZiyaretModal()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <!-- Kaydırılabilir form gövdesi -->
            <form id="ziyaretForm">
                <input type="hidden" id="editVisitId">
                <div class="modal-body-scroll">
                    <div class="form-group">
                        <label for="visitFirma">Firma Seç *</label>
                        <select id="visitFirma" class="form-control" required>
                            <option value="">Seçiniz...</option>
                        </select>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.85rem; margin-top:0.85rem;">
                        <div class="form-group">
                            <label for="visitTarih">Ziyaret Tarihi *</label>
                            <input type="date" id="visitTarih" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="visitSaat">Ziyaret Saati</label>
                            <input type="time" id="visitSaat" class="form-control">
                        </div>
                    </div>
                    <div class="form-group" style="margin-top:0.85rem;">
                        <label for="visitDurum">Ziyaret Durumu</label>
                        <select id="visitDurum" class="form-control">
                            <option value="Planlandı">⏳ Planlandı</option>
                            <option value="Tamamlandı">✅ Tamamlandı</option>
                            <option value="İptal Edildi">❌ İptal Edildi</option>
                            <option value="Demo">🔬 Demo</option>
                        </select>
                    </div>
                    <div class="form-group mt-3">
                        <label for="visitNot">Ziyaret Notu / Görüşme Detayları</label>
                        <textarea id="visitNot" class="form-control" rows="3" placeholder="Örn: X ürünü için sunum yapıldı..."></textarea>
                    </div>
                </div>
                <!-- Sticky alt butonlar -->
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" onclick="closeZiyaretModal()">İptal</button>
                    <button type="submit" id="kaydetBtn" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Kaydı Kaydet</button>
                </div>
            </form>
        </div>
    </div>

    <!-- JS -->
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <!-- Firebase Sync Logic -->
    <script src="js/firebase-sync.js?v=3.5"></script>
    <script src="js/main.js?v=3.5"></script>
    <script src="js/ziyaretler.js"></script>
</body>
</html>
