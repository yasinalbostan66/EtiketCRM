<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Stok Takibi | SATIŞ KİŞİSEL KULLANIM</title>
    <link rel="stylesheet" href="css/style.css?v=3.9">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script>if(localStorage.getItem("etiket_crm_theme") === "light") document.body.classList.add("light-mode");</script>

    <div class="app-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="logo">
                    <i class="fa-solid fa-layer-group"></i>
                    SATIŞ KİŞİSEL KULLANIM
                </a>
            </div>
            
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <i class="fa-solid fa-chart-line"></i>
                    Genel Bakış
                </a>
                <a href="firmalar.html" class="nav-item">
                    <i class="fa-solid fa-users"></i>
                    Müşteriler / Firmalar
                </a>
                <a href="ziyaretler.html" class="nav-item">
                    <i class="fa-solid fa-clipboard-list"></i>
                    Ziyaret Kayıtları
                </a>
                <a href="takvim.html" class="nav-item">
                    <i class="fa-solid fa-calendar-days"></i>
                    Ziyaret Takvimi
                </a>
                <a href="odeme_takibi.html" class="nav-item">
                    <i class="fa-solid fa-money-bill-transfer"></i>
                    Ödeme Takibi & Cari
                </a>
                
                <a href="malzeme_fiyatlari.html" class="nav-item">
                    <i class="fa-solid fa-tags"></i>
                    Malzeme Fiyatları
                </a>
                <a href="stok_takibi.html" class="nav-item active">
                    <i class="fa-solid fa-file-export"></i>
                    Stok ve Rapor Paylaşımı
                </a>

                
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="page-title d-flex gap-2 align-center">
                    <i class="fa-solid fa-file-export" style="color: var(--primary);"></i> Rapor Paylaşımı & Stok
                </div>
                <div class="header-actions">
                    <div id="userAvatarStr" style="width: 36px; height: 36px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 600; color: #fff;">
                        YA
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="panel" style="margin-bottom: 2rem;">
                    <div class="panel-header">
                        <h2 class="panel-title"><i class="fa-solid fa-filter"></i> Filtrele & Ara</h2>
                        <div class="header-actions" style="display: flex; gap: 0.5rem;">
                            <button class="btn btn-outline" onclick="document.getElementById('csvInput').click()" title="CSV İçe Aktar">
                                <i class="fa-solid fa-file-import"></i> <span class="hide-mobile">İçe Aktar</span>
                            </button>
                            <button class="btn btn-primary" onclick="shareStokReport()" title="Paylaş">
                                <i class="fa-solid fa-share-nodes"></i> <span class="hide-mobile">Paylaş</span>
                            </button>
                            <input type="file" id="csvInput" accept=".csv" style="display: none;">
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Malzeme Türü</label>
                            <select id="filterType" class="form-control">
                                <option value="HEPSİ">Tüm Malzemeler</option>
                                <option value="Kağıt">Kağıtlar</option>
                                <option value="Mürekkep">Mürekkepler</option>
                                <option value="Sarf Malzeme">Sarf Malzemeleri</option>
                                <option value="Klişe">Klişeler</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Malzeme Adı Ara</label>
                            <input type="text" id="searchTerm" class="form-control" placeholder="Örn: Kuşe, Siyah...">
                        </div>
                        <div class="form-group" style="justify-content: flex-end; display: flex;">
                             <div class="stat-info" style="text-align: right;">
                                 <p style="font-size: 0.75rem; margin-bottom: 4px;">Toplam Kalem</p>
                                 <h3 id="totalCountSpan" style="margin:0;">0</h3>
                             </div>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <div class="table-responsive">
                        <table id="stokTable">
                            <thead>
                                <tr>
                                    <th>Malzeme Adı</th>
                                    <th>Tür</th>
                                    <th>Mevcut Stok</th>
                                    <th>Birim</th>
                                    <th style="text-align: right;">İşlem</th>
                                </tr>
                            </thead>
                            <tbody id="stokTableBody">
                                <!-- JS ile Doldurulacak -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Hızlı Stok Düzenleme Modalı -->
    <div id="stokEditModal" class="modal-overlay" style="display: none;">
        <div class="modal-content panel" style="max-width: 400px; width: 90%;">
            <div class="panel-header">
                <h2 class="panel-title"><i class="fa-solid fa-pen-to-square"></i> Stok Güncelle</h2>
                <button class="btn-icon" onclick="document.getElementById('stokEditModal').style.display='none'">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="modal-body-scroll">
                <div class="form-group">
                    <label id="editMalzemeAdi" style="font-weight: 700; color: var(--text-main); font-size: 1rem;">-</label>
                    <p id="editMalzemeDetay" style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem;">Birim: -</p>
                </div>
                <div class="form-group">
                    <label for="newStokValue">Yeni Stok Miktarı</label>
                    <input type="number" id="newStokValue" class="form-control" step="0.01" placeholder="0.00">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="document.getElementById('stokEditModal').style.display='none'">Vazgeç</button>
                <button class="btn btn-primary" id="saveStokBtn">Güncelle</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <!-- PDF Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <!-- Core JS -->
    <script src="js/firebase-sync.js?v=3.9"></script>
    <script src="js/main.js?v=3.9"></script>
    <script src="js/stok_takibi.js"></script>
</body>
</html>
