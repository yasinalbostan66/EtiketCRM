<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/icon-192.png">
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("service-worker.js")
                    .then(reg => console.log("ServiceWorker registered"))
                    .catch(err => console.error("ServiceWorker failed:", err));
            });
        }
    </script>
    <title>Giriş Yap | SATIŞ KİŞİSEL KULLANIM CRM</title>
    <link rel="stylesheet" href="css/style.css?v=3.7">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #0b0f19;
            color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 420px;
            border: 1px solid rgba(255,255,255,0.06);
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .login-header i {
            font-size: 3.5rem;
            color: #4f46e5;
            margin-bottom: 1.25rem;
            filter: drop-shadow(0 0 15px rgba(79, 70, 229, 0.4));
        }
        .login-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }
        .login-header p {
            color: #9ca3af;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: #cbd5e1;
        }
        .input-icon-group {
            position: relative;
        }
        .input-icon-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }
        .input-icon-group input {
            width: 100%;
            padding: 14px 14px 14px 46px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.25s ease;
            box-sizing: border-box;
        }
        .input-icon-group input:focus {
            outline: none;
            border-color: #4f46e5;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.4);
            filter: brightness(1.1);
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #10b981;
            border-radius: 12px;
            color: #10b981;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s;
        }
        .btn-register:hover {
            background: rgba(16, 185, 129, 0.1);
            transform: scale(1.02);
        }
        #loginError {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <i class="fa-solid fa-layer-group"></i>
            <h1>CRM Giriş</h1>
            <p>Admin paneline erişmek için oturum açın</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-posta</label>
                <div class="input-icon-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="ornek@alanadi.com">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Şifre</label>
                <div class="input-icon-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
            </div>
            
            <button type="submit" class="btn-login" id="loginSubmitBtn">Oturum Aç</button>
            <button type="button" class="btn-login" id="registerBtn" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); margin-top:0.75rem;">Yeni Hesap Oluştur</button>
            <button type="button" class="btn-login" style="background:transparent; border:1px solid rgba(255,255,255,0.15); color:#94a3b8; margin-top:0.75rem; box-shadow:none;" onclick="window.location.href='index.html'">Şifresiz Devam Et (Test Modu)</button>
            <div id="loginError">E-posta veya şifre hatalı!</div>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <!-- Firebase configuration -->
    <script src="js/firebase-sync.js?v=3.7"></script>

    <script>
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('loginSubmitBtn');
        const registerBtn = document.getElementById('registerBtn');
        const errorDiv = document.getElementById('loginError');

        // Kullanıcı önceden giriş yapmışsa ana sayfaya yönlendir
        firebase.auth().onAuthStateChanged((user) => {
            if (user && window.location.pathname.endsWith('login.html')) {
                window.location.href = 'index.html';
            }
        });

        // ÜYE OL İşlemi
        registerBtn.addEventListener('click', () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if(!email || !password) {
                errorDiv.textContent = 'Kayıt olmak için lütfen bir e-posta ve şifre belirleyin!';
                errorDiv.style.display = 'block';
                return;
            }

            errorDiv.style.display = 'none';
            registerBtn.textContent = 'Kayıt Ediliyor...';
            registerBtn.disabled = true;

            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    alert("Hesabınız ( " + email + " ) başarıyla oluşturuldu! Şimdi bu bilgilerle giriş yapabilirsiniz.");
                    window.location.href = 'index.html';
                })
                .catch((error) => {
                    console.error("Kayıt hatası:", error);
                    errorDiv.style.display = 'block';
                    if(error.code === 'auth/email-already-in-use') {
                        errorDiv.textContent = 'Bu e-posta adresi zaten kullanımda! Lütfen sadece Oturum Aç butonunu kullanın.';
                    } else if (error.code === 'auth/weak-password') {
                        errorDiv.textContent = 'Şifre çok zayıf. Lütfen en az 6 karakter girin.';
                    } else {
                        errorDiv.textContent = 'Kayıt hatası: ' + error.message;
                    }
                    registerBtn.textContent = 'Yeni Hesap Oluştur';
                    registerBtn.disabled = false;
                });
        });

        // GİRİŞ YAP İşlemi
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if(!email || !password) {
                errorDiv.textContent = 'Lütfen e-posta ve şifrenizi girin!';
                errorDiv.style.display = 'block';
                return;
            }

            errorDiv.style.display = 'none';
            submitBtn.textContent = 'Giriş Yapılıyor...';
            submitBtn.disabled = true;

            // Firebase Authentication
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Başarılı giriş
                    window.location.href = 'index.html';
                })
                .catch((error) => {
                    console.error("Giriş hatası:", error);
                    errorDiv.style.display = 'block';
                    
                    if(error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential' || error.code === 'auth/invalid-login-credentials') {
                        errorDiv.innerHTML = 'E-posta veya şifre hatalı!<br><br>💡 (Henüz hesap açmadıysanız aşağıdaki yeşil <b>"Yeni Hesap Oluştur"</b> butonuna basarak kayıt olunuz.)';
                    } else if (error.code === 'auth/too-many-requests') {
                        errorDiv.textContent = 'Çok fazla deneme yaptınız. Lütfen daha sonra tekrar deneyin.';
                    } else {
                        errorDiv.textContent = 'Giriş yapılırken bir hata oluştu: ' + error.message;
                    }
                    
                    submitBtn.textContent = 'Oturum Aç';
                    submitBtn.disabled = false;
                });
        });
    </script>
</body>
</html>
