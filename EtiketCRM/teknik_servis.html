<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Teknik Servis Takibi | SATIŞ KİŞİSEL KULLANIM</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css?v=5.5">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .service-status {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 600;
        }
        .status-bekliyor { background: rgba(239, 68, 68, 0.15); color: #f87171; }
        .status-islemde { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .status-tamamlandi { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .status-iptal { background: rgba(100, 116, 139, 0.15); color: #94a3b8; }
    </style>
</head>
<body>
    <script>if(localStorage.getItem("etiket_crm_theme") === "light") document.body.classList.add("light-mode");</script>

    <div class="app-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="d-flex align-center gap-2">
                    <button class="btn-icon hide-desktop" id="mobileMenuBtn">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <div class="page-title">Teknik Servis Yönetimi</div>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="openNewServiceModal()">
                        <i class="fa-solid fa-screwdriver-wrench"></i> <span class="hide-mobile">Yeni Servis Formu</span>
                    </button>
                </div>
            </header>

            <div class="content-wrapper">
                <!-- Filtreleme Paneli -->
                <div class="panel" style="margin-bottom: 1.5rem;">
                    <div class="panel-header">
                        <h2 class="panel-title"><i class="fa-solid fa-filter"></i> Filtrele & Ara</h2>
                    </div>
                    <div class="panel-body">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="searchService">Arama (Firma, Cihaz, Seri No)</label>
                                <input type="text" id="searchService" class="form-control" placeholder="Ara..." oninput="renderTeknikServis()">
                            </div>
                            <div class="form-group">
                                <label for="filterStatus">Servis Durumu</label>
                                <select id="filterStatus" class="form-control" onchange="renderTeknikServis()">
                                    <option value="HEPSİ">Tüm Durumlar</option>
                                    <option value="Bekliyor">Bekliyor (Yeni)</option>
                                    <option value="İşlemde">İşlemde</option>
                                    <option value="Tamamlandı">Tamamlandı</option>
                                    <option value="İptal Edildi">İptal Edildi</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Teknik Servis Kayıtları Listesi -->
                <div class="panel">
                    <div class="panel-header">
                        <h2 class="panel-title"><i class="fa-solid fa-list-check"></i> Servis Kayıtları</h2>
                    </div>
                    <div class="table-responsive">
                        <table id="serviceTable">
                            <thead>
                                <tr>
                                    <th>Tarih</th>
                                    <th>Firma Adı</th>
                                    <th>Cihaz / Ürün</th>
                                    <th>Seri No</th>
                                    <th>Durum</th>
                                    <th class="hide-mobile">Yapılan İşlem</th>
                                    <th style="text-align: right;">İşlem</th>
                                </tr>
                            </thead>
                            <tbody id="serviceTableBody">
                                <!-- JS ile doldurulacak -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Yeni Servis Formu Modalı -->
    <div id="newServiceModal" class="modal-overlay" style="display: none;">
        <div class="modal-content panel" style="max-width: 600px; width: 95%;">
            <div class="panel-header">
                <h2 class="panel-title"><i class="fa-solid fa-screwdriver-wrench"></i> Teknik Servis Giriş Formu</h2>
                <button class="btn-icon" onclick="closeNewServiceModal()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <form id="serviceForm" onsubmit="saveServiceForm(event)">
                <input type="hidden" id="editServiceId">
                <div class="modal-body-scroll">
                    <!-- MÜŞTERİ BİLGİLERİ -->
                    <div style="font-weight: 700; font-size: 0.85rem; color: var(--primary); text-transform: uppercase; margin-bottom: 0.75rem; border-bottom: 1px solid var(--border-color); padding-bottom: 4px;">
                        Müşteri Bilgileri
                    </div>
                    <div class="form-grid" style="margin-bottom: 1.25rem;">
                        <div class="form-group">
                            <label for="serviceFirmaSec">Firma Seçimi *</label>
                            <select id="serviceFirmaSec" class="form-control" required onchange="onServiceFirmaChange()">
                                <option value="" disabled selected>Lütfen Firma Seçin...</option>
                                <!-- Firmalar JS ile eklenecek -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="serviceYetkili">Yetkili Kişi</label>
                            <input type="text" id="serviceYetkili" class="form-control" placeholder="Firma yetkilisi">
                        </div>
                        <div class="form-group">
                            <label for="serviceTelefon">Telefon</label>
                            <input type="text" id="serviceTelefon" class="form-control" placeholder="Telefon numarası">
                        </div>
                    </div>

                    <!-- CİHAZ & ÜRÜN BİLGİLERİ -->
                    <div style="font-weight: 700; font-size: 0.85rem; color: var(--primary); text-transform: uppercase; margin-bottom: 0.75rem; border-bottom: 1px solid var(--border-color); padding-bottom: 4px;">
                        Cihaz & Ürün Bilgileri
                    </div>
                    <div class="form-grid" style="margin-bottom: 1.25rem;">
                        <div class="form-group">
                            <label for="serviceCihaz">Cihaz Adı / Modeli *</label>
                            <input type="text" id="serviceCihaz" class="form-control" required placeholder="Cihaz marka/modeli">
                        </div>
                        <div class="form-group">
                            <label for="serviceSeriNo">Seri Numarası</label>
                            <input type="text" id="serviceSeriNo" class="form-control" placeholder="Cihaz seri no">
                        </div>
                        <div class="form-group">
                            <label for="serviceUrunTipi">Ürün / Hizmet Tipi</label>
                            <input type="text" id="serviceUrunTipi" class="form-control" placeholder="Örn: Barkod Yazıcı, Klişe Montaj vs.">
                        </div>
                    </div>

                    <!-- SERVİS DETAYLARI -->
                    <div style="font-weight: 700; font-size: 0.85rem; color: var(--primary); text-transform: uppercase; margin-bottom: 0.75rem; border-bottom: 1px solid var(--border-color); padding-bottom: 4px;">
                        Servis Detayları & İşlemler
                    </div>
                    <div class="form-group">
                        <label for="serviceAriza">Arıza / Sorun Tanımı *</label>
                        <textarea id="serviceAriza" class="form-control" rows="3" required placeholder="Arıza detaylarını açıklayın..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="serviceIslem">Yapılan İşlem / Çözüm</label>
                        <textarea id="serviceIslem" class="form-control" rows="3" placeholder="Uygulanan teknik işlemler..."></textarea>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="serviceDurum">Güncel Servis Durumu</label>
                            <select id="serviceDurum" class="form-control">
                                <option value="Bekliyor">Bekliyor (Kayıt Alındı)</option>
                                <option value="İşlemde">İşlemde / İncelemede</option>
                                <option value="Tamamlandı">Tamamlandı (Teslim Edildi)</option>
                                <option value="İptal Edildi">İptal Edildi</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="serviceUcret">Servis Ücreti ($)</label>
                            <input type="number" id="serviceUcret" class="form-control" min="0" step="0.01" placeholder="0.00">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" onclick="closeNewServiceModal()">Vazgeç</button>
                    <button type="submit" class="btn btn-primary">Kaydı Tamamla</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <!-- Core JS -->
    <script src="js/firebase-sync.js?v=5.5"></script>
    <script src="js/main.js?v=5.5"></script>
    <script src="js/teknik_servis.js"></script>
</body>
</html>
